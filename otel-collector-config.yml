extensions:

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 5s
          static_configs:
            - targets: ['0.0.0.0:8888']
        - job_name: k8s
          kubernetes_sd_configs:
          - role: pod
          relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          metric_relabel_configs:
          - source_labels: [__name__]
            regex: "(request_duration_seconds.*|response_duration_seconds.*)"
            action: keep
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    - timeout: 5s
  attributes/example:
    actions:
      - key: example_field
        action: insert
        value: "env=${ENVIRONMENT}"
      - key: redacted_span
        value: true
        action: upsert
      - key: account_id
        value: 2245
        action: insert
      - key: account_password
        action: delete
      - key: account_email
        action: hash
      - key: http.status_code
        action: convert
        converted_type: int

exporters:
  otlphttp/prometheus:
    endpoint: "http://prometheus:9090/api/v1/otlp"
    tls:
      insecure: true

  otlp/jaeger:
    endpoint: "http://jaeger:14317"
    tls:
      insecure: true
  
  debug:
    verbosity: detailed

service:
  pipelines:
    metrics/example:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [otlphttp/prometheus, debug]
    traces/example:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug, debug]
    logs:
        receivers: [otlp]
        processors: [batch, attributes/example]
        exporters: [debug]
