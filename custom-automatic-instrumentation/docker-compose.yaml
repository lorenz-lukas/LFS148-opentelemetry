
services:
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - QUERY_UI_CONFIG_PATH=/etc/jaeger/ui-config.json
    volumes:
      - ./jaeger-ui-config.json:/etc/jaeger/ui-config.json
      - ./jaeger-custom-theme.css:/jaeger-ui/custom-theme.css
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=todos
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todos"]
      interval: 10s
      timeout: 5s
      retries: 5

################# apps ######################
  todobackend-springboot:
    container_name: todobackend-springboot-manual-tracing
    build:
      context: ./todobackend-springboot
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./todobackend-springboot:/app
    environment:
      - JAVA_OPTS=-Xmx512m -Xms512m
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=todos
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - OTEL_SERVICE_NAME=todobackend-springboot
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      jaeger:
        condition: service_healthy
      postgres:
        condition: service_healthy

  usertodo-golang:
    build:
      context: ./usertodo-golang
      dockerfile: Dockerfile
    container_name: usertodo-golang
    environment:
      PORT: 8081
      DATABASE_DSN: host=postgres user=postgres password=postgres dbname=todos port=5432 sslmode=disable
    ports:
      - "8081:8081"
    networks:
      - app-network
    depends_on:
      jaeger:
        condition: service_healthy
      postgres:
        condition: service_healthy

  todoui-flask-manual-tracing:
    container_name: todoui-flask-manual-tracing
    build:
      context: ./todoui-flask
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./todoui-flask:/app
    environment:
      - BACKEND_URL=http://todobackend-springboot-manual-tracing:8080/todos/
      - OTEL_SERVICE_NAME=todoui-flask
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - FLASK_ENV=production
      - FLASK_APP=app.py
    networks:
      - app-network
    depends_on:
      jaeger:
        condition: service_started
      todobackend-springboot:
        condition: service_healthy
      usertodo-golang:
        condition: service_healthy


networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
