processors:
  # 1) Drop de métricas específicas
  filter/drop_unwanted_metrics:
    error_mode: ignore
    metrics:
      metric:
        # - name == "http.server.request.duration"            # exemplo
        - name =~ "process\\..*"                            # regex

  # 2) Drop de traces que não interessam
  filter/drop_unwanted_spans:
    error_mode: ignore
    traces:
      span:
        - attributes["http.route"] == "/health"
        - attributes["http.target"] == "/metrics"

  # 3) Drop de logs debug
  filter/drop_debug_logs:
    error_mode: ignore
    logs:
      log_record:
        - severity_number <= SEVERITY_NUMBER_DEBUG
        - severity_text == "DEBUG"

  # Opcional: reduzir volume de traces
  probabilistic_sampler:
    sampling_percentage: 20

service:
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [filter/drop_unwanted_metrics]
      exporters: [otlp]   # ajuste

    traces:
      receivers: [otlp]
      processors: [filter/drop_unwanted_spans, probabilistic_sampler]
      exporters: [otlp]   # ajuste

    logs:
      receivers: [otlp]
      processors: [filter/drop_debug_logs]
      exporters: [otlp]   # ajuste